interface=wlan0
driver=nl80211
# Required on Raspberry Pi OS Bookworm+ / nl80211 — without it hostapd often exits immediately (no SSID visible).
country_code=HOTSPOT_COUNTRY
ieee80211d=1
ssid=HOTSPOT_NAME
hw_mode=g
channel=HOTSPOT_CHANNEL
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=HOTSPOT_PASSWORD
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
